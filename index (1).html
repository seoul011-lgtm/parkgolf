<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스크린 파크골프 예약</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f5f5f0; }
        #root { min-height: 100vh; }

        .fade-in { animation: fadeIn 0.25s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .slide-up { animation: slideUp 0.3s cubic-bezier(0.16,1,0.3,1); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 2px; }

        /* Custom checkbox */
        .custom-check { appearance: none; -webkit-appearance: none; width: 20px; height: 20px; border: 2px solid #d1d5db; border-radius: 5px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; position: relative; }
        .custom-check:checked { background: #1a6b3c; border-color: #1a6b3c; }
        .custom-check:checked::after { content: ''; position: absolute; left: 5px; top: 2px; width: 6px; height: 10px; border: 2px solid white; border-top: none; border-left: none; transform: rotate(45deg); }

        /* Smooth transitions for tab content */
        .tab-content { transition: opacity 0.2s ease; }

        /* Privacy scrollbox */
        .privacy-scroll { max-height: 180px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: #d1d5db transparent; }

        /* Step indicator */
        .step-dot { width: 8px; height: 8px; border-radius: 50%; transition: all 0.2s; }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback } = React;

// ─── SVG Icons ───────────────────────────────────────────────────────────────
const icons = {
    info: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>,
    calendar: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>,
    check: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>,
    clock: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
    chevLeft: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6"/></svg>,
    chevRight: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>,
    qr: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/><line x1="17" y1="17" x2="21" y2="17"/><line x1="21" y1="17" x2="21" y2="21"/><line x1="17" y1="21" x2="21" y2="21"/></svg>,
    user: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    phone: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.71 3.35 2 2 0 0 1 3.68 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.29 6.29l1.02-1.02a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>,
    globe: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>,
    x: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    shield: <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>,
    checkCircle: <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>,
};

// ─── Calendar ─────────────────────────────────────────────────────────────────
const Calendar = ({ currentMonth, setCurrentMonth, selectedDates, onDateSelect, isHoliday, fmt }) => {
    const year = currentMonth.getFullYear();
    const month = currentMonth.getMonth();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const firstDay = new Date(year, month, 1).getDay();
    const days = [...Array(firstDay).fill(null), ...Array.from({length: daysInMonth}, (_, i) => i + 1)];
    const today = fmt(new Date());

    return (
        <div className="bg-white rounded-2xl overflow-hidden">
            {/* Month nav */}
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
                <button onClick={() => setCurrentMonth(new Date(year, month - 1, 1))}
                    className="w-9 h-9 rounded-xl bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors">
                    {icons.chevLeft}
                </button>
                <span className="font-bold text-gray-900 text-[15px]">{year}년 {month + 1}월</span>
                <button onClick={() => setCurrentMonth(new Date(year, month + 1, 1))}
                    className="w-9 h-9 rounded-xl bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-600 transition-colors">
                    {icons.chevRight}
                </button>
            </div>

            {/* Days of week */}
            <div className="grid grid-cols-7 px-3 pt-3 pb-1">
                {['일','월','화','수','목','금','토'].map((d, i) => (
                    <div key={d} className={`text-center text-xs font-semibold pb-2 ${i===0?'text-red-400':i===6?'text-blue-400':'text-gray-400'}`}>{d}</div>
                ))}
            </div>

            {/* Dates */}
            <div className="grid grid-cols-7 px-3 pb-4 gap-y-1">
                {days.map((day, idx) => {
                    if (!day) return <div key={`e-${idx}`} />;
                    const dateObj = new Date(year, month, day);
                    const dateStr = fmt(dateObj);
                    const holiday = isHoliday(dateObj);
                    const isSelected = selectedDates.includes(dateStr);
                    const isToday = dateStr === today;
                    const dayOfWeek = dateObj.getDay();

                    return (
                        <button key={day} disabled={holiday}
                            onClick={() => onDateSelect(dateStr)}
                            className={`
                                h-10 rounded-xl text-sm font-medium relative flex items-center justify-center transition-all
                                ${holiday ? 'text-gray-300 cursor-not-allowed' : 'hover:bg-gray-50'}
                                ${isSelected ? 'bg-green-700 text-white hover:bg-green-800 font-bold' : ''}
                                ${!isSelected && !holiday && dayOfWeek === 0 ? 'text-red-400' : ''}
                                ${!isSelected && !holiday && dayOfWeek === 6 ? 'text-blue-400' : ''}
                                ${!isSelected && !holiday && dayOfWeek !== 0 && dayOfWeek !== 6 ? 'text-gray-800' : ''}
                            `}>
                            {day}
                            {isToday && !isSelected && <span className="absolute bottom-1 left-1/2 -translate-x-1/2 w-1 h-1 rounded-full bg-green-500" />}
                        </button>
                    );
                })}
            </div>
        </div>
    );
};

// ─── Main App ─────────────────────────────────────────────────────────────────
const App = () => {
    const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbz4MoIEtPIM2twpYqPg3sz8eqlfrLLy-m_owjmwfsIrXuCwQfzTKxFB8sqLCLuikJwg/exec";
    const PRICE_PER_SESSION = 1500;
    const DEPLOYED_URL = window.location.href;

    const [activeTab, setActiveTab] = useState('info');
    const [bookingStep, setBookingStep] = useState(1);
    const [agreedPrivacy, setAgreedPrivacy] = useState(false);
    const [agreedOverseas, setAgreedOverseas] = useState(false);
    const [isSubmitting, setIsSubmitting] = useState(false);
    const [showQR, setShowQR] = useState(false);
    const [userName, setUserName] = useState('');
    const [userPhone, setUserPhone] = useState('');
    const [selectedDates, setSelectedDates] = useState([]);
    const [selectedTime, setSelectedTime] = useState(null);
    const [currentMonth, setCurrentMonth] = useState(new Date());

    const TIME_SLOTS = [
        { id: 1, label: "오전 1부", time: "09:00 ~ 10:30" },
        { id: 2, label: "오전 2부", time: "11:00 ~ 12:30" },
        { id: 3, label: "오후 1부", time: "14:00 ~ 15:30" },
        { id: 4, label: "오후 2부", time: "16:00 ~ 17:30" },
    ];

    const fmt = useCallback((date) => {
        const offset = date.getTimezoneOffset() * 60000;
        return new Date(date.getTime() - offset).toISOString().split('T')[0];
    }, []);

    const isHoliday = useCallback((date) => [0, 6].includes(date.getDay()), []);

    const toggleDate = useCallback((dateStr) => {
        setSelectedDates(prev =>
            prev.includes(dateStr) ? prev.filter(d => d !== dateStr) : [...prev, dateStr]
        );
    }, []);

    const handleFinalSubmit = async () => {
        setIsSubmitting(true);
        try {
            const timeLabel = TIME_SLOTS.find(t => t.id === selectedTime);
            const label = `${timeLabel.label} (${timeLabel.time})`;
            const promises = selectedDates.map(date =>
                fetch(GOOGLE_SHEET_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: userName, phone: userPhone, date, time: label, price: PRICE_PER_SESSION, timestamp: new Date().toLocaleString() })
                })
            );
            await Promise.all(promises);
            setBookingStep(4);
        } catch (e) {
            console.error(e);
        } finally {
            setIsSubmitting(false);
        }
    };

    const bothAgreed = agreedPrivacy && agreedOverseas;

    // ── Info Page ──────────────────────────────────────────────────────────────
    const InfoPage = () => (
        <div className="p-5 pb-28 space-y-4 fade-in">
            {/* Hero */}
            <div className="bg-green-700 rounded-2xl p-5 text-white">
                <div className="text-xs font-semibold opacity-70 mb-1 tracking-wider uppercase">Screen Park Golf</div>
                <h2 className="text-xl font-bold mb-3">온라인 예약 시스템</h2>
                <div className="flex items-center gap-2 text-sm opacity-90">
                    <span>{icons.clock}</span>
                    <span>평일 운영 · 주말·공휴일 휴무</span>
                </div>
            </div>

            {/* Hours */}
            <div className="bg-white rounded-2xl p-5">
                <h3 className="text-sm font-bold text-gray-500 mb-3 tracking-wide uppercase">운영 시간</h3>
                <div className="space-y-2">
                    {[
                        { label: "오전 1부", time: "09:00 ~ 10:30" },
                        { label: "오전 2부", time: "11:00 ~ 12:30" },
                        { label: "오후 1부", time: "14:00 ~ 15:30" },
                        { label: "오후 2부", time: "16:00 ~ 17:30" },
                    ].map(s => (
                        <div key={s.label} className="flex items-center justify-between py-2 border-b border-gray-50 last:border-0">
                            <span className="text-sm font-semibold text-gray-700">{s.label}</span>
                            <span className="text-sm text-gray-500 font-mono">{s.time}</span>
                        </div>
                    ))}
                </div>
                <div className="mt-4 pt-4 border-t border-gray-100 flex items-center gap-2">
                    <span className="text-green-700">{icons.phone}</span>
                    <span className="text-sm font-bold text-gray-700">문의: 02-440-5873</span>
                </div>
            </div>

            {/* QR */}
            <button onClick={() => setShowQR(true)}
                className="w-full bg-white rounded-2xl p-4 flex items-center justify-between border border-gray-100 hover:border-green-200 transition-colors">
                <div className="flex items-center gap-3">
                    <div className="w-9 h-9 rounded-xl bg-green-50 flex items-center justify-center text-green-700">{icons.qr}</div>
                    <div className="text-left">
                        <div className="text-sm font-bold text-gray-800">QR코드 바로가기</div>
                        <div className="text-xs text-gray-400">게시판용 접속 QR 확인</div>
                    </div>
                </div>
                <span className="text-gray-300">{icons.chevRight}</span>
            </button>

            {/* ── Privacy Section ── */}
            <div className="bg-white rounded-2xl overflow-hidden border border-gray-100">
                <div className="px-5 py-4 border-b border-gray-100 flex items-center gap-2">
                    <span className="text-green-700">{icons.shield}</span>
                    <h3 className="text-sm font-bold text-gray-800">개인정보 수집·이용 동의</h3>
                    <span className="ml-auto text-xs text-red-500 font-semibold">필수</span>
                </div>
                <div className="p-5 space-y-3">
                    <div className="privacy-scroll bg-gray-50 rounded-xl p-4 text-xs text-gray-600 leading-relaxed space-y-2">
                        <p className="font-semibold text-gray-700">[개인정보 수집·이용에 관한 안내]</p>
                        <table className="w-full text-xs border-collapse">
                            <tbody>
                                {[
                                    ["수집 항목", "성명, 전화번호"],
                                    ["수집 목적", "스크린 파크골프 프로그램 예약 접수 및 참여자 관리"],
                                    ["보유 기간", "해당 프로그램 종료 후 1년"],
                                ].map(([k, v]) => (
                                    <tr key={k} className="border-b border-gray-200 last:border-0">
                                        <td className="py-1.5 pr-3 font-semibold text-gray-600 whitespace-nowrap">{k}</td>
                                        <td className="py-1.5 text-gray-500">{v}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        <p className="text-gray-500 pt-1">※ 귀하는 개인정보 수집·이용에 동의하지 않을 권리가 있습니다. 다만, 동의하지 않을 경우 예약 신청이 불가합니다.</p>
                    </div>
                    <label className="flex items-center gap-3 cursor-pointer select-none">
                        <input type="checkbox" className="custom-check" checked={agreedPrivacy} onChange={e => setAgreedPrivacy(e.target.checked)} />
                        <span className="text-sm font-semibold text-gray-800">개인정보 수집·이용에 동의합니다</span>
                    </label>
                </div>
            </div>

            {/* ── Overseas Transfer ── */}
            <div className="bg-white rounded-2xl overflow-hidden border border-gray-100">
                <div className="px-5 py-4 border-b border-gray-100 flex items-center gap-2">
                    <span className="text-blue-500">{icons.globe}</span>
                    <h3 className="text-sm font-bold text-gray-800">개인정보 국외이전 동의</h3>
                    <span className="ml-auto text-xs text-red-500 font-semibold">필수</span>
                </div>
                <div className="p-5 space-y-3">
                    <div className="privacy-scroll bg-gray-50 rounded-xl p-4 text-xs text-gray-600 leading-relaxed space-y-3">
                        <p className="font-semibold text-gray-700">[개인정보 국외이전에 관한 동의]</p>
                        <p>본 신청서는 원활한 접수·관리를 위해 기관 Google Workspace 계정 기반 구글폼을 이용합니다. 이에 따라 신청서에 입력한 개인정보가 국외 서버로 전송·보관될 수 있어, 「개인정보보호법」 제28조의8에 따라 아래와 같이 안내드리고 별도 동의를 받습니다.</p>
                        <table className="w-full text-xs border-collapse">
                            <tbody>
                                {[
                                    ["이전받는 자", "Google LLC"],
                                    ["연락처", "https://policies.google.com/privacy"],
                                    ["이전 국가", "미국 (※ Google 서비스 운영 정책에 따라 기타 국가 데이터센터로 이전될 수 있음)"],
                                    ["이전 일시 및 방법", "신청서 제출 시 네트워크를 통한 자동 전송 및 보관"],
                                    ["이전되는 항목", "본 신청서에서 수집하는 모든 개인정보 항목"],
                                    ["이용 목적", "신청서 데이터 저장, 시스템 운영 및 클라우드 서비스 제공 (※ Google은 수탁자로서 데이터 보관 기능만 제공하며, 다른 목적으로 활용하지 않음)"],
                                    ["보유 및 이용기간", "해당 프로그램의 개인정보 보유·이용기간과 동일"],
                                ].map(([k, v]) => (
                                    <tr key={k} className="border-b border-gray-200 last:border-0">
                                        <td className="py-1.5 pr-3 font-semibold text-gray-600 whitespace-nowrap align-top">{k}</td>
                                        <td className="py-1.5 text-gray-500">{v}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        <p className="text-gray-500">※ 귀하는 개인정보 국외이전에 동의하지 않을 권리가 있습니다. 다만, 동의하지 않을 경우 구글폼을 통한 온라인 신청이 불가합니다.</p>
                    </div>
                    <label className="flex items-center gap-3 cursor-pointer select-none">
                        <input type="checkbox" className="custom-check" checked={agreedOverseas} onChange={e => setAgreedOverseas(e.target.checked)} />
                        <span className="text-sm font-semibold text-gray-800">개인정보 국외이전에 동의합니다</span>
                    </label>
                </div>
            </div>

            <button disabled={!bothAgreed}
                onClick={() => { setActiveTab('booking'); setBookingStep(1); }}
                className={`w-full py-4 rounded-2xl text-base font-bold transition-all ${bothAgreed ? 'bg-green-700 text-white active:scale-98' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                {bothAgreed ? '예약 신청하기 →' : '위 동의 항목을 모두 확인해주세요'}
            </button>
        </div>
    );

    // ── Booking Pages ──────────────────────────────────────────────────────────
    const renderBookingPage = () => {
        const steps = ['신청자 정보', '날짜 선택', '시간 선택'];

        const StepHeader = ({ n, title }) => (
            <div className="mb-5">
                <div className="flex items-center gap-2 mb-1">
                    {steps.map((_, i) => (
                        <div key={i} className={`step-dot ${i < n ? 'bg-green-700' : i === n-1 ? 'bg-green-700 w-5' : 'bg-gray-200'}`} />
                    ))}
                </div>
                <div className="text-xs text-gray-400 font-medium">Step {n} / {steps.length}</div>
                <h2 className="text-xl font-bold text-gray-900 mt-0.5">{title}</h2>
            </div>
        );

        if (bookingStep === 1) return (
            <div className="p-5 pb-28 fade-in">
                <StepHeader n={1} title="신청자 정보" />
                <div className="space-y-4">
                    <div>
                        <label className="block text-sm font-semibold text-gray-600 mb-2 flex items-center gap-1.5">
                            {icons.user} 이름
                        </label>
                        <input type="text" placeholder="성함을 입력하세요" value={userName}
                            onChange={e => setUserName(e.target.value)}
                            className="w-full px-4 py-3.5 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm font-medium placeholder-gray-300 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all" />
                    </div>
                    <div>
                        <label className="block text-sm font-semibold text-gray-600 mb-2 flex items-center gap-1.5">
                            {icons.phone} 전화번호
                        </label>
                        <input type="tel" placeholder="010-0000-0000" value={userPhone}
                            onChange={e => setUserPhone(e.target.value)}
                            className="w-full px-4 py-3.5 bg-white border border-gray-200 rounded-xl text-gray-900 text-sm font-mono placeholder-gray-300 focus:outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all" />
                    </div>
                    <button disabled={!userName || !userPhone}
                        onClick={() => setBookingStep(2)}
                        className={`w-full mt-2 py-4 rounded-xl text-sm font-bold transition-all ${userName && userPhone ? 'bg-green-700 text-white' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                        다음 단계 →
                    </button>
                </div>
            </div>
        );

        if (bookingStep === 2) return (
            <div className="p-5 pb-28 fade-in">
                <StepHeader n={2} title="날짜 선택" />
                <Calendar currentMonth={currentMonth} setCurrentMonth={setCurrentMonth}
                    selectedDates={selectedDates} onDateSelect={toggleDate}
                    isHoliday={isHoliday} fmt={fmt} />
                {selectedDates.length > 0 && (
                    <div className="mt-3 px-4 py-3 bg-green-50 rounded-xl flex items-center justify-between">
                        <span className="text-sm text-green-700 font-semibold">{selectedDates.length}일 선택</span>
                        <span className="text-sm font-bold text-green-800">{(selectedDates.length * PRICE_PER_SESSION).toLocaleString()}원</span>
                    </div>
                )}
                <div className="flex gap-3 mt-4">
                    <button onClick={() => setBookingStep(1)}
                        className="flex-1 py-3.5 rounded-xl bg-gray-100 text-gray-600 text-sm font-bold">이전</button>
                    <button disabled={selectedDates.length === 0} onClick={() => setBookingStep(3)}
                        className={`flex-[2] py-3.5 rounded-xl text-sm font-bold ${selectedDates.length > 0 ? 'bg-green-700 text-white' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                        시간 선택 →
                    </button>
                </div>
            </div>
        );

        if (bookingStep === 3) return (
            <div className="p-5 pb-28 fade-in">
                <StepHeader n={3} title="시간 선택" />
                <div className="space-y-2">
                    {TIME_SLOTS.map(slot => (
                        <button key={slot.id} onClick={() => setSelectedTime(slot.id)}
                            className={`w-full p-4 rounded-xl border text-left flex items-center justify-between transition-all ${selectedTime === slot.id ? 'border-green-600 bg-green-50' : 'border-gray-100 bg-white hover:border-gray-200'}`}>
                            <div>
                                <div className={`text-sm font-bold ${selectedTime === slot.id ? 'text-green-800' : 'text-gray-800'}`}>{slot.label}</div>
                                <div className="text-xs text-gray-400 font-mono mt-0.5">{slot.time}</div>
                            </div>
                            {selectedTime === slot.id && (
                                <div className="w-6 h-6 rounded-full bg-green-600 flex items-center justify-center text-white">{icons.check}</div>
                            )}
                        </button>
                    ))}
                </div>
                <div className="flex gap-3 mt-4">
                    <button onClick={() => setBookingStep(2)}
                        className="flex-1 py-3.5 rounded-xl bg-gray-100 text-gray-600 text-sm font-bold">이전</button>
                    <button disabled={!selectedTime || isSubmitting} onClick={handleFinalSubmit}
                        className={`flex-[2] py-3.5 rounded-xl text-sm font-bold ${selectedTime ? 'bg-green-700 text-white' : 'bg-gray-100 text-gray-400 cursor-not-allowed'}`}>
                        {isSubmitting ? '처리 중...' : '신청 완료'}
                    </button>
                </div>
            </div>
        );

        if (bookingStep === 4) return (
            <div className="p-5 flex flex-col items-center justify-center min-h-96 fade-in text-center">
                <div className="w-20 h-20 rounded-full bg-green-50 flex items-center justify-center text-green-600 mb-5">
                    {icons.checkCircle}
                </div>
                <h2 className="text-2xl font-bold text-gray-900 mb-2">신청 완료</h2>
                <p className="text-sm text-gray-500 mb-1">예약이 정상적으로 접수되었습니다.</p>
                <p className="text-sm text-gray-500 mb-8">안내실 방문 후 결제 부탁드립니다.</p>
                <div className="w-full space-y-2 text-left bg-gray-50 rounded-2xl p-4 text-sm mb-6">
                    <div className="flex justify-between"><span className="text-gray-500">신청자</span><span className="font-semibold text-gray-800">{userName}</span></div>
                    <div className="flex justify-between"><span className="text-gray-500">날짜</span><span className="font-semibold text-gray-800">{selectedDates.length}일</span></div>
                    <div className="flex justify-between"><span className="text-gray-500">시간</span><span className="font-semibold text-gray-800">{TIME_SLOTS.find(t=>t.id===selectedTime)?.label}</span></div>
                    <div className="flex justify-between border-t border-gray-200 pt-2 mt-2"><span className="text-gray-500">결제 예정액</span><span className="font-bold text-green-700">{(selectedDates.length * PRICE_PER_SESSION).toLocaleString()}원</span></div>
                </div>
                <button onClick={() => location.reload()}
                    className="w-full py-4 bg-gray-900 text-white rounded-xl text-sm font-bold">처음으로 돌아가기</button>
            </div>
        );
    };

    // ── Status Page ────────────────────────────────────────────────────────────
    const StatusPage = () => (
        <div className="p-5 pb-28 fade-in">
            <h2 className="text-xl font-bold text-gray-900 mb-4">예약 현황</h2>
            <Calendar currentMonth={currentMonth} setCurrentMonth={setCurrentMonth}
                selectedDates={[]} onDateSelect={() => {}} isHoliday={isHoliday} fmt={fmt} />
            <p className="text-xs text-center text-gray-400 mt-3">날짜별 예약 인원을 확인할 수 있습니다</p>
        </div>
    );

    return (
        <div className="max-w-sm mx-auto min-h-screen bg-gray-50 flex flex-col relative">
            {/* Header */}
            <div className="bg-white border-b border-gray-100 px-5 py-4 sticky top-0 z-40 flex items-center justify-between">
                <div>
                    <div className="text-[10px] font-semibold text-green-600 tracking-widest uppercase">Screen Park Golf</div>
                    <h1 className="text-base font-bold text-gray-900 leading-tight">예약 시스템</h1>
                </div>
                <button onClick={() => setShowQR(true)}
                    className="w-9 h-9 rounded-xl bg-gray-50 hover:bg-gray-100 flex items-center justify-center text-gray-500 transition-colors">
                    {icons.qr}
                </button>
            </div>

            {/* Content */}
            <div className="flex-grow overflow-y-auto">
                {activeTab === 'info' && <InfoPage />}
                {activeTab === 'booking' && renderBookingPage()}
                {activeTab === 'status' && <StatusPage />}
            </div>

            {/* Bottom Nav */}
            <div className="fixed bottom-0 left-0 right-0 max-w-sm mx-auto bg-white border-t border-gray-100 flex z-40">
                {[
                    { id: 'info', icon: icons.info, label: '이용안내' },
                    { id: 'booking', icon: icons.calendar, label: '예약신청' },
                    { id: 'status', icon: icons.check, label: '예약현황' },
                ].map(tab => (
                    <button key={tab.id}
                        onClick={() => { setActiveTab(tab.id); if(tab.id==='booking') setBookingStep(1); }}
                        className={`flex-1 flex flex-col items-center gap-1 py-3 text-xs font-semibold transition-colors ${activeTab === tab.id ? 'text-green-700' : 'text-gray-400'}`}>
                        <span className={activeTab === tab.id ? 'text-green-700' : 'text-gray-400'}>{tab.icon}</span>
                        {tab.label}
                        {activeTab === tab.id && <div className="absolute top-0 left-0 right-0" style={{height:'2px', background:'transparent'}} />}
                    </button>
                ))}
            </div>

            {/* QR Modal */}
            {showQR && (
                <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center">
                    <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setShowQR(false)} />
                    <div className="relative bg-white w-full max-w-sm rounded-t-3xl sm:rounded-3xl p-6 slide-up">
                        <div className="flex items-center justify-between mb-5">
                            <h3 className="text-base font-bold text-gray-900">접속용 QR코드</h3>
                            <button onClick={() => setShowQR(false)}
                                className="w-8 h-8 rounded-full bg-gray-100 flex items-center justify-center text-gray-500">{icons.x}</button>
                        </div>
                        <div className="flex justify-center bg-gray-50 rounded-2xl p-6 mb-4">
                            <img src={`https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(DEPLOYED_URL)}`}
                                alt="QR Code" className="w-44 h-44" />
                        </div>
                        <p className="text-[10px] text-gray-400 text-center break-all bg-gray-50 rounded-xl p-2 mb-4">{DEPLOYED_URL}</p>
                        <button onClick={() => setShowQR(false)}
                            className="w-full py-3.5 bg-green-700 text-white rounded-xl text-sm font-bold">닫기</button>
                    </div>
                </div>
            )}
        </div>
    );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
